{% extends "base.html" %}
{% block content %}
<header class="page-head">
  <div>
    <h2>{{ t("app.title") }}</h2>
    <p class="page-description">{{ t("dashboard.description") }}</p>
  </div>
</header>
<section class="tool-grid" aria-label="Available tools">
  {% for tool in tools %}
    <a class="tool-card" href="{{ url_for(tool.endpoint) }}">
      <span class="tool-icon"><i data-lucide="{{ tool.icon }}"></i></span>
      <span class="tool-card-body">
        <small>{{ t("tool." ~ tool.id ~ ".category") }}</small>
        <strong>{{ t("tool." ~ tool.id ~ ".name") }}</strong>
        <span>{{ t("tool." ~ tool.id ~ ".description") }}</span>
      </span>
    </a>
  {% endfor %}
</section>
{% endblock %}
