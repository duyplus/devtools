{% extends "base.html" %}
{% block title %}{{ t("tool.password.name") }}{% endblock %}
{% block content %}
<header class="page-head">
  <div>
    <h2>{{ t("tool.password.name") }}</h2>
    <p class="page-description">{{ t("tool.password.description") }}</p>
  </div>
</header>
{% if error %}<div data-toast-error hidden>{{ error }}</div>{% endif %}
<div data-password-error hidden></div>
<form class="tool-panel" method="post" data-password-tool data-password-no-types="{{ t('password.no_types') }}" data-password-success="{{ t('password.generated') }}">
  <div class="split">
    <div class="option-panel">
      <label>
        <span>{{ t("password.length") }}: <strong data-password-length>{{ form.length }}</strong></span>
        <div class="password-length-row">
          <input type="range" name="length_range" min="4" max="128" value="{{ form.length }}" data-password-length-range>
          <input type="number" name="length" min="4" max="128" value="{{ form.length }}" data-password-length-input>
        </div>
      </label>
      <fieldset>
        <legend>{{ t("password.types") }}</legend>
        <div class="checks columns">
          <label><input type="checkbox" name="lowercase" {% if form.lowercase %}checked{% endif %}> {{ t("password.lowercase") }}</label>
          <label><input type="checkbox" name="uppercase" {% if form.uppercase %}checked{% endif %}> {{ t("password.uppercase") }}</label>
          <label><input type="checkbox" name="digits" {% if form.digits %}checked{% endif %}> {{ t("password.digits") }}</label>
          <label><input type="checkbox" name="symbols" {% if form.symbols %}checked{% endif %}> {{ t("password.symbols") }}</label>
        </div>
      </fieldset>
      <label>
        {{ t("password.count") }}
        <input type="number" name="count" min="1" max="50" value="{{ form.count }}">
      </label>
      <div class="actions password-actions">
        <button type="submit"><i data-lucide="sparkles"></i>{{ t("password.generate") }}</button>
      </div>
    </div>
    <label>
      {{ t("common.result") }}
      <span class="line-numbered-textarea textarea-password">
        <span class="line-number-gutter" data-line-numbers-for="password-result"></span>
        <textarea class="delimiter-textarea" rows="16" data-desktop-rows="16" data-mobile-rows="7" spellcheck="false" readonly data-password-result data-line-numbers-target="password-result">{{ result|join("\n") }}</textarea>
      </span>
    </label>
  </div>
</form>
{% endblock %}
